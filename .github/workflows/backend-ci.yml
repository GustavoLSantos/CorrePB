name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check Python syntax (compile)
        run: python -m compileall backend

      - name: Run tests (if present)
        run: |
          if [ -d backend/tests ] || grep -q "\[tool\.pytest\]" backend/pyproject.toml 2>/dev/null || [ -f backend/pytest.ini ]; then
            python -m pip install pytest
            pytest backend -q --maxfail=1
          else
            echo "No tests detected in backend/, skipping pytest."
          fi
